name: Build RouterOS container archives

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            platform: linux/arm64
            archive: unbound-mikrotik-linux-arm64.tar
          - arch: armv7
            platform: linux/arm/v7
            archive: unbound-mikrotik-linux-armv7.tar
          - arch: amd64
            platform: linux/amd64
            archive: unbound-mikrotik-linux-amd64.tar

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker archive
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          tags: unbound-mikrotik:${{ matrix.arch }}
          outputs: type=docker,dest=${{ matrix.archive }}
          provenance: false
          sbom: false

      - name: Generate checksum
        run: sha256sum "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: unbound-mikrotik-${{ matrix.arch }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256
