server:
  # Container runtime
  username: "unbound"
  directory: "/etc/unbound"
  chroot: ""
  pidfile: "/run/unbound/unbound.pid"
  use-syslog: no
  logfile: ""
  verbosity: 0

  # Listen on both address families. IPv6 needs RouterOS veth IPv6 connectivity.
  interface: 0.0.0.0
  interface: ::
  port: 53
  do-ip4: yes
  do-ip6: yes
  do-udp: yes
  do-tcp: yes
  prefer-ip6: no

  # Keep this resolver private by default.
  access-control: 0.0.0.0/0 refuse
  access-control: ::/0 refuse
  access-control: 127.0.0.0/8 allow
  access-control: ::1/128 allow
  access-control: 10.0.0.0/8 allow
  access-control: 172.16.0.0/12 allow
  access-control: 192.168.0.0/16 allow
  access-control: fc00::/7 allow
  access-control: fe80::/10 allow

  # True recursive mode: ask the DNS root and walk delegations.
  root-hints: "/etc/unbound/root.hints"
  module-config: "validator iterator"

  # DNSSEC validation and hardening.
  auto-trust-anchor-file: "/var/lib/unbound/root.key"
  harden-glue: yes
  harden-dnssec-stripped: yes
  harden-below-nxdomain: yes
  harden-referral-path: no
  val-clean-additional: yes
  aggressive-nsec: no
  qname-minimisation: yes
  root-key-sentinel: yes
  deny-any: yes
  minimal-responses: yes

  # AdGuard Home should do client-facing cache/filtering. Keep Unbound thin.
  num-threads: 1
  msg-cache-size: 0
  rrset-cache-size: 0
  key-cache-size: 0
  neg-cache-size: 0
  infra-cache-numhosts: 512
  outgoing-range: 64
  num-queries-per-thread: 32
  outgoing-num-tcp: 4
  incoming-num-tcp: 2
  edns-buffer-size: 1232
  prefetch: no
  prefetch-key: no
  serve-expired: no

  # Do not leak implementation details.
  hide-identity: yes
  hide-version: yes
  identity: "unbound"
  version: "unbound"

remote-control:
  control-enable: no
